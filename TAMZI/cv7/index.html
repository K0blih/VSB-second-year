<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style type = "text/css">
            html, body{
                height: 100%;
            }
            body{
                background: #000000;
                padding: 0px;
                margin: 0px;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            canvas{
                display: block;
                margin: 0;
            }
            #phaser-app {
                width: min(82vw, 82vh);
                height: min(82vw, 82vh);
                max-width: 700px;
                max-height: 700px;
                position: relative;
            }
        </style>
    </head>
    <body>
        <div id="phaser-app"></div>
        <script defer src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.js"></script>
        <script defer src="game.js"></script>
    </body>
</html>
