<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Storage</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">SKJ CV6</p>
        <h1>Object Storage Control Panel</h1>
        <p class="hero-copy">
          Upload, inspect, download, and remove files for a selected user without
          leaving the browser.
        </p>
      </header>

      <main class="grid">
        <section class="panel">
          <h2>Session</h2>
          <label class="field">
            <span>User ID</span>
            <input id="userId" type="text" placeholder="user-1" />
          </label>
          <p class="hint">
            The app sends this value as the <code>X-User-Id</code> header.
          </p>
          <button id="loadFilesButton" class="secondary">Load Files</button>
        </section>

        <section class="panel">
          <h2>Upload</h2>
          <form id="uploadForm" class="upload-form">
            <label class="field">
              <span>Select file</span>
              <input id="fileInput" type="file" required />
            </label>
            <button type="submit">Upload File</button>
          </form>
          <p id="uploadStatus" class="status" aria-live="polite"></p>
        </section>

        <section class="panel files-panel">
          <div class="panel-header">
            <h2>Stored Files</h2>
            <span id="fileCount" class="badge">0 files</span>
          </div>
          <p id="listStatus" class="status" aria-live="polite"></p>
          <div id="emptyState" class="empty-state">No files loaded yet.</div>
          <div id="fileList" class="file-list"></div>
        </section>
      </main>
    </div>
  </body>
</html>
